<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#081016" />
  <meta name="description" content="CEN Bible 사사시대 Matrix" />
  <meta property="og:title" content="CEN Bible 사사시대 Matrix" />
  <meta property="og:description" content="사사시대 개막부터 왕이 없던 시대까지 사사시대 핵심사건 Matrix" />
  <meta property="og:image" content="assets/judges-bg.png" />
  <title>CEN Bible 사사시대 Matrix</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <main id="viewport" class="viewport" aria-label="사사시대 매트릭스 화면">
      <section id="canvas" class="canvas">
        <img class="matrix-bg" src="assets/judges-bg.png" alt="사사시대 매트릭스 배경" draggable="false" />

        <div class="button-set row-1" data-event="사사시대 개막">
          <a class="hub-button" href="hubs/index.html?hub=opening" data-kind="hub"><span>📜</span><b>개막 허브</b></a>
          <button data-kind="link"><span>🔗</span><b>연결탐험</b></button>
          <button data-kind="integrated"><span>✦</span><b>통합탐험</b></button>
        </div>
        <div class="button-set row-2" data-event="드보라의 승리">
          <a class="hub-button" href="hubs/index.html?hub=deborah" data-kind="hub"><span>⚔️</span><b>드보라 허브</b></a>
          <button data-kind="link"><span>🔗</span><b>연결탐험</b></button>
          <button data-kind="integrated"><span>✦</span><b>통합탐험</b></button>
        </div>
        <div class="button-set row-3" data-event="기드온의 300용사">
          <a class="hub-button" href="hubs/index.html?hub=gideon" data-kind="hub"><span>📯</span><b>기드온 허브</b></a>
          <button data-kind="link"><span>🔗</span><b>연결탐험</b></button>
          <button data-kind="integrated"><span>✦</span><b>통합탐험</b></button>
        </div>
        <div class="button-set row-4" data-event="삼손의 최후">
          <a class="hub-button" href="hubs/index.html?hub=samson" data-kind="hub"><span>🦁</span><b>삼손 허브</b></a>
          <button data-kind="link"><span>🔗</span><b>연결탐험</b></button>
          <button data-kind="integrated"><span>✦</span><b>통합탐험</b></button>
        </div>
        <div class="button-set row-5" data-event="왕이 없던 시대">
          <a class="hub-button" href="hubs/index.html?hub=no-king" data-kind="hub"><span>👑</span><b>왕 없음 허브</b></a>
          <button data-kind="link"><span>🔗</span><b>연결탐험</b></button>
          <button data-kind="integrated"><span>✦</span><b>통합탐험</b></button>
        </div>
      </section>
    </main>

    <aside class="flow-dock" aria-label="사사시대 핵심흐름">
      <strong>사사시대 핵심흐름</strong>
      <span>개막 › 드보라 › 기드온 › 삼손 › 왕 없음</span>
    </aside>

    <nav class="footer" aria-label="하단 메뉴">
      <button type="button" data-footer="home"><span>⌂</span><b>홈</b></button>
      <button type="button" data-footer="all"><span>◎</span><b>전체</b></button>
      <button type="button" data-footer="hub"><span>▣</span><b>허브</b></button>
      <button type="button" data-footer="prev"><span>‹</span><b>정복시대</b></button>
      <button type="button" data-footer="next" class="next"><span>›</span><b>통일왕국</b></button>
    </nav>
  </div>

  <dialog id="infoDialog" class="dialog">
    <div class="dialog-card">
      <h2 id="dialogTitle">사사시대</h2>
      <p id="dialogText">사사시대 탐험창입니다.</p>
      <div class="dialog-actions"><button id="closeDialog" type="button">닫기</button></div>
    </div>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
